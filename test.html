<!DOCTYPE html>
<html>
<head><meta name="viewport" content="width=device-width,initial-scale=1"/></head>
<body style="background:#050d14;color:#e2eaf2;font-family:monospace;padding:20px">
<div id="status" style="background:red;padding:10px;border-radius:8px;margin-bottom:20px;font-size:14px;font-weight:bold">JS NOT RUNNING</div>
<button onclick="document.getElementById('status').style.background='green';document.getElementById('status').textContent='JS WORKS — CLICKS WORK'" 
style="background:#f0b429;border:none;padding:15px;font-size:16px;border-radius:8px;width:100%;font-weight:bold">TAP ME</button>
<div id="log" style="margin-top:20px;font-size:11px;color:#4a7a9b"></div>
<script>
try {
  document.getElementById('status').style.background='orange';
  document.getElementById('status').textContent='JS RUNNING — tap button above';
  document.getElementById('log').textContent='Script executed OK at '+new Date().toLocaleTimeString();
} catch(e) {
  document.getElementById('log').textContent='SCRIPT ERROR: '+e.message;
}
</script>
</body>
</html>
