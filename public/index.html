<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MAVERICK v3.5</title>
    <style>
        body { background: #0a0a0a; color: #00ff41; font-family: 'Courier New', monospace; margin: 0; padding: 15px; }
        .btn-row { display: flex; gap: 10px; margin-bottom: 20px; }
        button { flex: 1; padding: 18px; border: none; border-radius: 8px; font-weight: bold; font-size: 14px; cursor: pointer; }
        .btn-nova { background: #ff0000; color: white; }
        .btn-whale { background: #0055ff; color: white; }
        .card { background: #1a1a1a; padding: 15px; border-radius: 8px; margin-bottom: 12px; border-left: 5px solid #333; }
        .mmr-badge { float: right; background: #333; padding: 4px 8px; border-radius: 4px; font-size: 12px; }
        .supernova { border-left-color: #ff0000; }
    </style>
</head>
<body>
    <h2 style="text-align:center; color:white;">MAVERICK v3.5</h2>
    
    <div class="btn-row">
        <button class="btn-nova" onclick="runScan('supernova')">🚀 SUPERNOVA</button>
        <button class="btn-whale" onclick="runScan('whale')">🐋 WHALE HUNT</button>
    </div>

    <div id="status" style="text-align:center; margin-bottom:10px; font-size:12px; color:#888;">READY FOR SCAN</div>
    <div id="resultsGrid"></div>

    <script>
        async function runScan(type) {
            const grid = document.getElementById('resultsGrid');
            const status = document.getElementById('status');
            status.innerText = "CRUNCHING MATH...";
            grid.innerHTML = "";
            
            try {
                const r = await fetch('/api/maverick-scan', { 
                    method: 'POST', 
                    headers: {'Content-Type': 'application/json'}, 
                    body: JSON.stringify({ type }) 
                });
                const data = await r.json();
                status.innerText = "SCAN COMPLETE";
                
                grid.innerHTML = data.results.map(res => `
                    <div class="card ${res.mmr > 75 ? 'supernova' : ''}">
                        <div class="mmr-badge">MMR: ${res.mmr}</div>
                        <b style="font-size:1.2em;">$${res.symbol}</b>
                        <div style="margin:8px 0; color:white;">$${res.price} (${res.change > 0 ? '+' : ''}${res.change.toFixed(2)}%)</div>
                        <div style="font-size:0.8em; color:#888;">ROTATION: ${res.rotation}x | RVOL: ${res.rvol}x</div>
                        <div style="font-size:0.9em; margin-top:8px; color:#00ff41;">${res.catalyst}</div>
                    </div>
                `).join('');
            } catch (e) {
                status.innerText = "SCAN ERROR";
            }
        }
    </script>
</body>
</html>
