<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MAVERICK v3.5 COMMAND</title>
    <style>
        body { background: #050505; color: #00ff41; font-family: monospace; margin: 0; padding: 10px; }
        .header { text-align: center; border-bottom: 1px solid #222; padding-bottom: 10px; margin-bottom: 15px; }
        .btn-row { display: flex; gap: 8px; margin-bottom: 15px; }
        button { flex: 1; padding: 16px; border: none; border-radius: 6px; font-weight: bold; font-size: 13px; color: white; cursor: pointer; text-transform: uppercase; }
        .btn-nova { background: linear-gradient(45deg, #ff0000, #990000); }
        .btn-whale { background: linear-gradient(45deg, #0055ff, #002288); }
        .card { background: #111; padding: 12px; border-radius: 8px; margin-bottom: 10px; border: 1px solid #222; position: relative; }
        .mmr-ring { position: absolute; right: 12px; top: 12px; font-size: 18px; font-weight: bold; color: #fff; border: 2px solid #ff0000; border-radius: 50%; width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; background: #000; }
        .symbol { font-size: 1.4em; color: #fff; }
        .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; margin: 10px 0; font-size: 12px; }
        .stat { color: #888; }
        .val { color: #fff; }
        .chart-btn { width: 100%; background: #222; margin-top: 10px; padding: 10px; border: 1px solid #444; color: #00ff41; }
        .lux-buy { color: #00ff41; font-weight: bold; }
    </style>
</head>
<body>
    <div class="header">
        <h2 style="margin:0;">MAVERICK v3.5</h2>
        <small id="status">CORE ENGINE: ONLINE</small>
    </div>
    
    <div class="btn-row">
        <button class="btn-nova" onclick="runScan('supernova')">🚀 SUPERNOVA</button>
        <button class="btn-whale" onclick="runScan('whale')">🐋 WHALE HUNT</button>
    </div>

    <div id="results"></div>

    <script>
        async function runScan(type) {
            const resDiv = document.getElementById('results');
            document.getElementById('status').innerText = "CRUNCHING MATH...";
            resDiv.innerHTML = "";
            
            try {
                const r = await fetch('/api/maverick-scan', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ type }) });
                const data = await r.json();
                document.getElementById('status').innerText = `FOUND ${data.results.length} SETUPS`;
                
                resDiv.innerHTML = data.results.map(res => `
                    <div class="card" style="border-left: 4px solid ${res.mmr > 70 ? '#ff0000' : '#0055ff'}">
                        <div class="mmr-ring" style="border-color: ${res.mmr > 70 ? '#ff0000' : '#0055ff'}">${res.mmr}</div>
                        <div class="symbol">$${res.symbol}</div>
                        <div style="color: ${res.change > 0 ? '#00ff41' : '#ff4444'}">$${res.price} (${res.change > 0 ? '+' : ''}${res.change.toFixed(2)}%)</div>
                        
                        <div class="stat-grid">
                            <div class="stat">ROTATION: <span class="val">${res.rotation}x</span></div>
                            <div class="stat">RVOL: <span class="val">${res.rvol}x</span></div>
                            <div class="stat">LUXALGO: <span class="${res.luxSignal === 'BUY' ? 'lux-buy' : 'val'}">${res.luxSignal}</span></div>
                        </div>

                        <div style="font-size: 0.85em; color: #aaa; border-top: 1px solid #222; padding-top: 8px;">
                            ${res.catalyst}
                        </div>

                        <button class="chart-btn" onclick="window.open('https://finviz.com/chart.ashx?t=${res.symbol}&p=i5')">VIEW 5M CHART 📈</button>
                    </div>
                `).join('');
            } catch (e) { document.getElementById('status').innerText = "OFFLINE - RECHECK RENDER"; }
        }
    </script>
</body>
</html>
