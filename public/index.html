<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MAVERICK ELITE v4.8</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0d1117; color: #e6edf3; font-family: sans-serif; }
        .maverick-card { background: #161b22; border-radius: 8px; border: 1px solid #30363d; }
        .lion-border { border-top: 4px solid #f0b429; }
        .shark-border { border-top: 4px solid #60a5fa; }
        .btn-gold { background: #f0b429; color: #0d1117; font-weight: bold; }
        .loading-bar { height: 4px; background: #30363d; overflow: hidden; position: relative; }
        .loading-bar div { height: 100%; background: #f0b429; width: 0%; transition: width 0.3s; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
        .pulse { animation: pulse 2s infinite; }
    </style>
</head>
<body class="p-4">
    <header class="mb-6">
        <h1 class="text-2xl font-bold uppercase tracking-widest">MAVERICK <span class="text-[#f0b429]">ELITE</span> <span class="text-xs text-gray-500">v4.8</span></h1>
    </header>

    <div class="flex gap-2 mb-6">
        <input type="text" id="tickerInput" placeholder="ENTER TICKER..." class="bg-[#0d1117] border border-[#30363d] rounded p-2 flex-grow uppercase font-mono">
        <button onclick="auditTape()" class="btn-gold px-4 py-2 rounded text-sm whitespace-nowrap">AUDIT TAPE</button>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-6">
        <div class="maverick-card p-4 lion-border">
            <h3 class="text-[#f0b429] font-bold text-xs uppercase flex items-center gap-2">
                🦁 LION BRAIN <span class="text-gray-500 font-normal">(Floor Audit)</span>
            </h3>
            <div id="lionStatus" class="text-sm mt-2 text-gray-400 italic">Awaiting...</div>
            <div id="lionData" class="mt-4 space-y-2 hidden">
                <div class="flex justify-between text-xs"><span>BPI SCORE</span> <span id="bpiScore" class="font-bold">--</span></div>
                <div class="flex justify-between text-xs"><span>DEMAND ZONE</span> <span id="demandZone" class="font-mono">--</span></div>
                <div class="text-[10px] text-gray-500 mt-2" id="lionVerdict">--</div>
            </div>
            <div class="loading-bar mt-4"><div id="lionProgress"></div></div>
        </div>

        <div class="maverick-card p-4 shark-border">
            <h3 class="text-[#60a5fa] font-bold text-xs uppercase flex items-center gap-2">
                🦈 SHARK BRAIN <span class="text-gray-500 font-normal">(Momentum)</span>
            </h3>
            <div id="sharkStatus" class="text-sm mt-2 text-gray-400 italic">Awaiting...</div>
            <div id="sharkData" class="mt-4 space-y-2 hidden">
                <div class="flex justify-between text-xs"><span>SHARK SCORE</span> <span id="sharkScore" class="font-bold">--</span></div>
                <div class="flex justify-between text-xs"><span>VELOCITY</span> <span id="sharkVel" class="font-mono">--</span></div>
                <div class="text-[10px] text-gray-500 mt-2" id="sharkVerdict">--</div>
            </div>
            <div class="loading-bar mt-4"><div id="sharkProgress" style="background:#60a5fa"></div></div>
        </div>
    </div>

    <div class="maverick-card overflow-hidden">
        <div class="p-3 bg-[#1c2128] border-b border-[#30363d] text-[10px] font-bold tracking-widest flex items-center gap-2">
            📜 AUDITED BACKTEST LOG
        </div>
        <table class="w-full text-left text-[10px]">
            <thead>
                <tr class="text-gray-500 border-b border-[#30363d]">
                    <th class="p-3">TICKER</th>
                    <th class="p-3">PRICE</th>
                    <th class="p-3">VERDICT</th>
                    <th class="p-3">STATUS</th>
                </tr>
            </thead>
            <tbody id="backtestLog">
                <tr class="text-gray-600"><td colspan="4" class="p-8 text-center">No audit history found.</td></tr>
            </tbody>
        </table>
    </div>

    <script>
        async function auditTape() {
            const ticker = document.getElementById('tickerInput').value.toUpperCase().trim();
            if(!ticker) return;

            // Reset UI
            const elements = ['lionData', 'sharkData', 'lionStatus', 'sharkStatus'];
            elements.forEach(id => {
                if(id.includes('Data')) document.getElementById(id).classList.add('hidden');
                else document.getElementById(id).classList.remove('hidden');
            });
            document.getElementById('lionProgress').style.width = '30%';
            document.getElementById('sharkProgress').style.width = '30%';

            try {
                // Call Analyze (Lion) and Shark Brains in parallel
                const [lionRes, sharkRes] = await Promise.all([
                    fetch('/api/analyze', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({ticker}) }),
                    fetch('/api/shark', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({ticker}) })
                ]);

                const lion = await lionRes.json();
                const shark = await sharkRes.json();

                if (lion.error || shark.error) throw new Error("Analysis failed");

                // Update Lion UI
                document.getElementById('lionStatus').classList.add('hidden');
                document.getElementById('lionData').classList.remove('hidden');
                document.getElementById('bpiScore').innerText = lion.bpi.score + '%';
                document.getElementById('demandZone').innerText = '$' + lion.bpi.demandZone;
                document.getElementById('lionVerdict').innerText = lion.verdict.headline;
                document.getElementById('lionProgress').style.width = '100%';

                // Update Shark UI
                document.getElementById('sharkStatus').classList.add('hidden');
                document.getElementById('sharkData').classList.remove('hidden');
                document.getElementById('sharkScore').innerText = shark.sharkScore + '/100';
                document.getElementById('sharkVel').innerText = shark.phaseVelocity.label;
                document.getElementById('sharkVerdict').innerText = shark.verdict;
                document.getElementById('sharkProgress').style.width = '100%';

                refreshBacktest();
            } catch (e) {
                alert("Analysis failed. Check your API keys.");
                console.error(e);
            }
        }

        async function refreshBacktest() {
            const res = await fetch('/api/backtest');
            const data = await res.json();
            const log = document.getElementById('backtestLog');
            if(data.recent && data.recent.length) {
                log.innerHTML = data.recent.slice(0,5).map(v => `
                    <tr class="border-b border-[#30363d]">
                        <td class="p-3 font-bold">${v.ticker}</td>
                        <td class="p-3">$${v.priceAtVerdict}</td>
                        <td class="p-3 ${v.verdict === 'BUY' ? 'text-green-500' : 'text-red-500'}">${v.verdict}</td>
                        <td class="p-3 text-gray-500">${v.outcome || 'PENDING'}</td>
                    </tr>
                `).join('');
            }
        }
        refreshBacktest();
    </script>
</body>
</html>
