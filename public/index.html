<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0"/>
<title>Maverick Cockpit 4.0</title>
<script src="https://s3.tradingview.com/tv.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<style>
:root{
  --bg:#0f1923;
  --bg2:#162030;
  --bg3:#1e2d40;
  --border:#243548;
  --text:#d4e0ed;
  --muted:#6b87a0;
  --gold:#f0b429;
  --green:#22c55e;
  --red:#ef4444;
  --blue:#60a5fa;
  --purple:#a78bfa;
  --orange:#fb923c;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:var(--bg);color:var(--text);font-family:'Courier New',monospace;padding:12px;min-height:100vh}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}

/* Header */
.hdr{display:flex;align-items:center;gap:10px;margin-bottom:14px;padding-bottom:12px;border-bottom:1px solid var(--border)}
.hdr-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;animation:pulse 2s ease-in-out infinite}
.hdr h1{color:#fff;font-size:17px;font-weight:900}
.hdr h1 span{color:var(--gold)}
.hdr-sub{font-size:8px;color:#2a4060;letter-spacing:2px;margin-top:2px}
.hdr-time{margin-left:auto;font-size:9px;color:var(--border);font-family:monospace}
@keyframes pulse{0%,100%{opacity:.5;transform:scale(.9)}50%{opacity:1;transform:scale(1.1)}}

/* Tabs */
.tabs{display:flex;flex-wrap:wrap;gap:5px;padding:8px 12px 6px;border-bottom:1px solid var(--border)}
.tab{background:transparent;border:1px solid var(--border);color:var(--muted);padding:6px 11px;font-size:9px;font-weight:800;letter-spacing:1px;border-radius:6px;cursor:pointer;font-family:monospace;white-space:nowrap}
.tab.active{background:rgba(240,180,41,.1);border-color:var(--gold);color:var(--gold)}

/* Cards */
.card{background:var(--bg2);border:1px solid var(--border);border-radius:9px;padding:13px;margin-bottom:10px}
.lbl{font-size:9px;color:var(--muted);letter-spacing:2px;font-weight:700;text-transform:uppercase;margin-bottom:8px}

input,select,textarea{background:var(--bg);border:1px solid var(--border);border-radius:6px;color:var(--text);padding:10px 12px;font-family:monospace;font-size:13px;width:100%;margin-bottom:7px}
.btn{border:none;border-radius:7px;padding:12px;font-family:monospace;font-size:10px;font-weight:900;cursor:pointer;width:100%;letter-spacing:2px;margin-bottom:7px}
.btn-gold{background:linear-gradient(135deg,#f0b429,#cc8f00);color:#000}
.btn-dark{background:var(--bg3);border:1px solid var(--border);color:var(--muted);font-size:9px}
.btn-tg{background:#229ED9;color:#fff;border:none}

/* Verdicts */
.verdict-box{padding:16px;border-radius:10px;margin-bottom:12px;border:2px solid}
.vBUY{background:linear-gradient(135deg,#001a0a,#000d05);border-color:var(--green);box-shadow:0 0 24px rgba(34,197,94,.12)}
.vDONT_BUY{background:linear-gradient(135deg,#1a0505,#0d0202);border-color:var(--red)}
.vWATCH{background:linear-gradient(135deg,#1a1400,#0d0b00);border-color:var(--gold)}
.v-action{font-size:22px;font-weight:900;letter-spacing:2px}
.conv-bar{height:5px;background:var(--bg3);border-radius:3px;margin-top:10px;overflow:hidden}
.conv-fill{height:100%;border-radius:3px}

/* Grids */
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:5px;margin-bottom:9px}
.metric{background:var(--bg);border:1px solid var(--bg3);border-radius:6px;padding:7px}
.ml{font-size:8px;color:#3a5570;letter-spacing:1px;text-transform:uppercase;margin-bottom:3px}
.mv{font-size:13px;font-weight:700;font-family:monospace;color:var(--text)}

/* BPI & Probability Styles */
.bpi-card{border-radius:9px;padding:12px 14px;margin-bottom:9px;border:1px solid}
.bpi-high{background:linear-gradient(135deg,rgba(34,197,94,.08),transparent);border-color:rgba(34,197,94,.35)}
.prob-hero{background:linear-gradient(135deg,#0a0f1e,#0f1830);border:1px solid rgba(167,139,250,.2);border-radius:12px;padding:14px;margin-bottom:10px}
.chart-wrap{position:relative;height:200px;margin-bottom:8px}

/* Shadow Layer */
.alt-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-top:10px}
.alt-stat{background:#0a111a;border:1px solid var(--border);padding:9px;border-radius:7px;text-align:center}

.hidden{display:none}
footer{margin-top:12px;font-size:8px;color:var(--bg3);text-align:center;padding-bottom:28px}
</style>
</head>
<body>

<div class="hdr">
  <div class="hdr-dot" id="statusDot" style="background:var(--gold)"></div>
  <div>
    <h1>Maverick <span>Cockpit 4.0</span></h1>
    <div class="hdr-sub">MMR ENGINE · LUXALGO · ATR STOPS · WHALE INTEL</div>
  </div>
  <div class="hdr-time" id="clock">--:-- ET</div>
</div>

<div class="tabs" id="tabBar">
  <button class="tab active" data-tab="analyze">ANALYZE</button>
  <button class="tab" data-tab="chart">CHART</button>
  <button class="tab" data-tab="whales">WHALES</button>
  <button class="tab" data-tab="perfect">PERFECT</button>
  <button class="tab" data-tab="supernova">SUPERNOVA</button>
  <button class="tab" data-tab="signals">SIGNALS</button>
  <button class="tab" data-tab="catalyst">CATALYST</button>
  <button class="tab" data-tab="squeeze">SQUEEZE</button>
  <button class="tab" data-tab="pulse">PULSE</button>
  <button class="tab" data-tab="prob">PROBABILITY</button>
  <button class="tab" data-tab="advisor">ADVISOR</button>
</div>

<div id="tab-analyze">
  <div class="card" style="border-color:var(--gold)">
    <div class="lbl" style="color:var(--gold)">Lion Brain Audit</div>
    <input id="ticker" placeholder="ENTER TICKER (e.g. LFVN)"/>
    <button class="btn btn-gold" onclick="runAnalysis()">RUN LION ANALYSIS</button>
  </div>
  <div id="analyzeResult"></div>
</div>

<div id="tab-chart" class="hidden"><div id="tv_chart_content"></div></div>
<div id="tab-whales" class="hidden"><div id="whaleResult"></div></div>
<div id="tab-prob" class="hidden"><div id="probResult"></div></div>
<div id="tab-squeeze" class="hidden"><div id="sqScanOut"></div></div>
<div id="tab-pulse" class="hidden"><div id="pulseGrid"></div></div>

<script>
// ── CORE SYSTEM LOGIC ─────────────────────────────────────────────
var BOT_USERNAME = '';
var chatSessionId = 'session_' + Date.now();

// Clock
function tick(){
  var et = new Date(new Date().toLocaleString('en-US',{timeZone:'America/New_York'}));
  document.getElementById('clock').textContent = String(et.getHours()).padStart(2,'0') + ':' + String(et.getMinutes()).padStart(2,'0') + ' ET';
}
setInterval(tick, 30000); tick();

// Tab Switching
document.querySelectorAll('.tab').forEach(t => {
  t.onclick = () => {
    document.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
    document.querySelectorAll('[id^=tab-]').forEach(x => x.classList.add('hidden'));
    t.classList.add('active');
    document.getElementById('tab-' + t.dataset.tab).classList.remove('hidden');
  }
});

// Analyze
async function runAnalysis() {
  var sym = document.getElementById('ticker').value.toUpperCase().trim();
  if(!sym) return;
  var out = document.getElementById('analyzeResult');
  out.innerHTML = '<div class="card"><div class="loading-box">ENGAGING LION BRAIN...</div></div>';
  try {
    var r = await fetch('/api/analyze', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ ticker: sym })
    });
    var data = await r.json();
    renderAnalysis(data, out);
  } catch(e) { out.innerHTML = 'Error: ' + e.message; }
}

function renderAnalysis(data, out) {
  var v = data.verdict || {};
  var q = data.data.quote || {};
  out.innerHTML = `
    <div class="verdict-box v${v.verdict}">
      <div class="v-action">${v.verdict}</div>
      <div class="v-headline">${v.headline}</div>
      <div class="conv-bar"><div class="conv-fill" style="width:${v.conviction}%; background:var(--gold)"></div></div>
    </div>
    <div class="card">
      <div class="lbl">MMR: ${data.mmr.total} | Float: ${(q.floatShares/1e6).toFixed(1)}M</div>
      <div class="g3">
        <div class="metric"><div class="ml">Price</div><div class="mv">$${q.price}</div></div>
        <div class="metric"><div class="ml">Change</div><div class="mv">${q.changePct}%</div></div>
        <div class="metric"><div class="ml">BPI</div><div class="mv">${data.bpi.score}%</div></div>
      </div>
    </div>
  `;
}

// ── INITIALIZE MODULES ───────────────────────────────────────────
async function init() {
  try {
    const res = await fetch('/api/health');
    const status = await res.json();
    if(status.services.telegram) document.getElementById('statusDot').style.background = '#22c55e';
  } catch(e) {}
}
init();
</script>
</body>
</html>
