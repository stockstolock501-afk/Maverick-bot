<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MAVERICK ELITE v4.9</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0d1117; color: #e6edf3; font-family: 'Inter', sans-serif; }
        .maverick-card { background: #161b22; border: 1px solid #30363d; border-radius: 4px; }
        .tab-active { border-bottom: 2px solid #f0b429; color: #f0b429; }
        .glow-gold { box-shadow: 0 0 15px rgba(240, 180, 41, 0.1); }
        .ticker-tape { animation: scroll 30s linear infinite; white-space: nowrap; }
        @keyframes scroll { from { transform: translateX(100%); } to { transform: translateX(-100%); } }
    </style>
</head>
<body class="flex flex-col h-screen">

    <header class="p-4 border-b border-[#30363d] flex justify-between items-center bg-[#0d1117] sticky top-0 z-50">
        <h1 class="text-xl font-bold tracking-tighter">MAVERICK <span class="text-[#f0b429]">ELITE</span></h1>
        <div id="connectionStatus" class="text-[10px] bg-green-900/30 text-green-400 px-2 py-1 rounded border border-green-800 uppercase font-mono">System Live</div>
    </header>

    <nav class="flex border-b border-[#30363d] bg-[#161b22] text-[10px] font-bold uppercase tracking-widest">
        <button onclick="showTab('audit')" id="tab-audit" class="flex-1 py-3 tab-active">Audit</button>
        <button onclick="showTab('scanners')" id="tab-scanners" class="flex-1 py-3">Scanners</button>
        <button onclick="showTab('pulse')" id="tab-pulse" class="flex-1 py-3">Pulse</button>
        <button onclick="showTab('catalyst')" id="tab-catalyst" class="flex-1 py-3">Catalyst</button>
    </nav>

    <main class="flex-grow overflow-y-auto p-4 space-y-4">

        <div id="view-audit" class="tab-view space-y-4">
            <div class="flex gap-2">
                <input type="text" id="tickerInput" placeholder="SYMBOL" class="bg-[#0d1117] border border-[#30363d] rounded p-3 flex-grow uppercase font-mono text-lg outline-none focus:border-[#f0b429]">
                <button onclick="auditTape()" class="bg-[#f0b429] text-black font-black px-6 rounded uppercase italic text-sm">Audit</button>
            </div>

            <div class="grid grid-cols-2 gap-3">
                <div class="maverick-card p-4 border-t-4 border-[#f0b429]">
                    <div class="text-[10px] text-gray-500 font-bold uppercase">Lion Brain (BPI)</div>
                    <div id="bpiDisplay" class="text-2xl font-mono mt-1">--</div>
                    <div id="bpiLabel" class="text-[9px] text-gray-400 mt-1 uppercase">Awaiting Tape...</div>
                </div>
                <div class="maverick-card p-4 border-t-4 border-[#60a5fa]">
                    <div class="text-[10px] text-gray-500 font-bold uppercase">Shark (Momentum)</div>
                    <div id="sharkDisplay" class="text-2xl font-mono mt-1">--</div>
                    <div id="sharkLabel" class="text-[9px] text-gray-400 mt-1 uppercase">Cold Waters</div>
                </div>
            </div>

            <div id="verdictBox" class="maverick-card p-4 hidden">
                <div class="text-[10px] text-[#f0b429] font-bold uppercase mb-2">Institutional Verdict</div>
                <div id="verdictText" class="text-xs leading-relaxed text-gray-300 italic">--</div>
            </div>
        </div>

        <div id="view-scanners" class="tab-view hidden space-y-4">
            <div class="maverick-card overflow-hidden">
                <div class="bg-[#1c2128] p-2 text-[9px] font-bold uppercase tracking-widest border-b border-[#30363d] text-blue-400">Squeeze Radar (Phase 1 & 2)</div>
                <div id="squeezeList" class="divide-y divide-[#30363d]">
                    <div class="p-4 text-center text-xs text-gray-500">Scanning for Coiled Springs...</div>
                </div>
            </div>
        </div>

        <div id="view-pulse" class="tab-view hidden space-y-4">
             <div class="maverick-card p-4 text-center border-dashed border-2 border-[#30363d]">
                <div class="text-xs font-bold text-[#f0b429] uppercase mb-1">Market Sentiment</div>
                <div id="macroRegime" class="text-sm font-mono tracking-tighter">FETCHING MACRO...</div>
             </div>
             <div id="moversList" class="space-y-2"></div>
        </div>

        <div id="view-catalyst" class="tab-view hidden space-y-4">
            <div id="catalystList" class="space-y-3">
                <div class="p-8 text-center text-xs text-gray-600">Initializing Intelligence Feed...</div>
            </div>
        </div>

    </main>

    <footer class="bg-[#161b22] border-t border-[#30363d] p-3">
        <div class="flex justify-between text-[9px] text-gray-500 uppercase font-mono">
            <span>Verdicts Resolved: <span id="stat-verdicts" class="text-gray-300">0</span></span>
            <span>Win Rate: <span id="stat-wins" class="text-green-500">0%</span></span>
        </div>
    </footer>

    <script>
        function showTab(tabId) {
            document.querySelectorAll('.tab-view').forEach(v => v.classList.add('hidden'));
            document.querySelectorAll('nav button').forEach(b => b.classList.remove('tab-active'));
            document.getElementById('view-' + tabId).classList.remove('hidden');
            document.getElementById('tab-' + tabId).classList.add('tab-active');
            if (tabId === 'pulse') refreshPulse();
            if (tabId === 'catalyst') refreshCatalysts();
            if (tabId === 'scanners') refreshSqueeze();
        }

        async function auditTape() {
            const ticker = document.getElementById('tickerInput').value.toUpperCase().trim();
            if(!ticker) return;
            
            // Trigger Lion/Shark
            const res = await fetch('/api/analyze', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({ticker}) });
            const data = await res.json();
            
            document.getElementById('bpiDisplay').innerText = data.bpi.score + '%';
            document.getElementById('bpiLabel').innerText = data.bpi.label;
            document.getElementById('sharkDisplay').innerText = data.shark.score + '/100';
            document.getElementById('sharkLabel').innerText = data.shark.verdict;
            document.getElementById('verdictText').innerText = data.verdict.headline;
            document.getElementById('verdictBox').classList.remove('hidden');
        }

        async function refreshCatalysts() {
            const res = await fetch('/api/catalyst-feed');
            const data = await res.json();
            const list = document.getElementById('catalystList');
            list.innerHTML = data.items.map(c => `
                <div class="maverick-card p-3 border-l-2 ${c.tier === 1 ? 'border-red-500' : 'border-blue-500'}">
                    <div class="flex justify-between items-start mb-1">
                        <span class="text-[10px] font-black bg-gray-800 px-1 rounded">${c.ticker || 'NEWS'}</span>
                        <span class="text-[8px] text-gray-500">${c.source} · ${c.ageH}h</span>
                    </div>
                    <div class="text-[11px] font-medium leading-tight">${c.headline}</div>
                </div>
            `).join('');
        }

        async function refreshSqueeze() {
            const res = await fetch('/api/squeeze-scan');
            const data = await res.json();
            const list = document.getElementById('squeezeList');
            list.innerHTML = data.results.map(s => `
                <div class="p-3 flex justify-between items-center">
                    <div>
                        <div class="text-xs font-bold">${s.symbol} <span class="text-[9px] text-gray-500 font-normal">$${s.price}</span></div>
                        <div class="text-[9px] text-green-400 uppercase font-bold">${s.phase.label}</div>
                    </div>
                    <div class="text-right">
                        <div class="text-[10px] font-mono">SI: ${s.siPercent}%</div>
                        <div class="text-[10px] font-mono">DTC: ${s.dtc}d</div>
                    </div>
                </div>
            `).join('');
        }

        async function refreshPulse() {
            const res = await fetch('/api/movers');
            const data = await res.json();
            const list = document.getElementById('moversList');
            list.innerHTML = data.gainers.map(m => `
                <div class="maverick-card p-3 flex justify-between items-center bg-[#0d1117]">
                    <span class="text-xs font-bold">${m.sym}</span>
                    <span class="text-[10px] text-green-400 font-mono">+${m.chg.toFixed(1)}%</span>
                    <span class="text-[10px] text-gray-500 font-mono">${m.rv}x Vol</span>
                </div>
            `).join('');
        }

        // Stats Init
        async function fetchStats() {
            const res = await fetch('/api/backtest');
            const data = await res.json();
            document.getElementById('stat-verdicts').innerText = data.resolved;
            document.getElementById('stat-wins').innerText = data.winRate + '%';
        }
        fetchStats();
    </script>
</body>
</html>
