<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maverick Bot Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            color: white;
            margin-bottom: 30px;
            text-align: center;
        }

        header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }

        header p {
            font-size: 1.1em;
            opacity: 0.9;
        }

        .dashboard {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .card {
            background: white;
            border-radius: 12px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(0,0,0,0.3);
        }

        .card h2 {
            color: #667eea;
            font-size: 1.2em;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .card-content {
            color: #333;
            line-height: 1.8;
        }

        .stock-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid #eee;
        }

        .stock-item:last-child {
            border-bottom: none;
        }

        .stock-symbol {
            font-weight: 600;
            color: #667eea;
        }

        .stock-price {
            font-size: 1.3em;
            font-weight: bold;
            color: #333;
        }

        .price-change {
            padding: 4px 8px;
            border-radius: 6px;
            font-size: 0.9em;
            font-weight: 600;
        }

        .price-up {
            background-color: #d4edda;
            color: #155724;
        }

        .price-down {
            background-color: #f8d7da;
            color: #721c24;
        }

        .status {
            padding: 12px;
            border-radius: 8px;
            text-align: center;
            font-weight: 600;
            margin-bottom: 10px;
        }

        .status.active {
            background-color: #d4edda;
            color: #155724;
        }

        .status.inactive {
            background-color: #f8d7da;
            color: #721c24;
        }

        .search-container {
            margin-bottom: 30px;
            display: flex;
            gap: 10px;
        }

        input {
            flex: 1;
            padding: 12px 15px;
            border: none;
            border-radius: 8px;
            font-size: 1em;
        }

        button {
            padding: 12px 30px;
            background: white;
            color: #667eea;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        button:hover {
            background: #667eea;
            color: white;
            transform: scale(1.05);
        }

        .error {
            background: #f8d7da;
            color: #721c24;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
        }

        .loading {
            text-align: center;
            color: white;
            font-size: 1.2em;
        }

        .last-updated {
            text-align: center;
            color: white;
            font-size: 0.9em;
            opacity: 0.8;
            margin-top: 20px;
        }

        @media (max-width: 768px) {
            header h1 {
                font-size: 1.8em;
            }

            .dashboard {
                grid-template-columns: 1fr;
            }

            .search-container {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>📈 Maverick Bot Dashboard</h1>
            <p>Real-time Stock Market Insights</p>
        </header>

        <div class="search-container">
            <input type="text" id="stockInput" placeholder="Enter stock symbol (e.g., AAPL, TSLA)..." />
            <button onclick="searchStock()">Search</button>
        </div>

        <div id="error" class="error" style="display:none;"></div>
        <div id="loading" class="loading" style="display:none;">Loading data...</div>

        <div id="dashboard" class="dashboard"></div>

        <div class="last-updated" id="lastUpdated"></div>
    </div>

    <script>
        // API Configuration
        const FINNHUB_KEY = 'YOUR_FINNHUB_KEY_HERE';
        const JSONBIN_KEY = 'YOUR_JSONBIN_KEY_HERE';
        const JSONBIN_BIN = 'YOUR_JSONBIN_BIN_HERE';

        // Default stocks to display
        const DEFAULT_STOCKS = ['AAPL', 'MSFT', 'GOOGL', 'TSLA', 'AMZN'];

        // Initialize dashboard on page load
        document.addEventListener('DOMContentLoaded', () => {
            loadDefaultStocks();
        });

        // Load default stocks
        async function loadDefaultStocks() {
            const dashboard = document.getElementById('dashboard');
            dashboard.innerHTML = '';
            
            for (const symbol of DEFAULT_STOCKS) {
                await addStockCard(symbol);
            }
            
            updateLastUpdated();
        }

        // Add stock card to dashboard
        async function addStockCard(symbol) {
            try {
                showLoading(true);
                const data = await fetchStockData(symbol);
                
                if (data) {
                    const card = createStockCard(data);
                    document.getElementById('dashboard').appendChild(card);
                }
            } catch (error) {
                showError(`Failed to load ${symbol}: ${error.message}`);
            } finally {
                showLoading(false);
            }
        }

        // Fetch stock data from Finnhub
        async function fetchStockData(symbol) {
            try {
                const response = await fetch(
                    `https://finnhub.io/api/v1/quote?symbol=${symbol}&token=${FINNHUB_KEY}`
                );
                
                if (!response.ok) throw new Error('API Error');
                
                const data = await response.json();
                return {
                    symbol: symbol,
                    price: data.c || 0,
                    change: data.d || 0,
                    changePercent: data.dp || 0,
                    high: data.h || 0,
                    low: data.l || 0,
                    open: data.o || 0
                };
            } catch (error) {
                console.error(`Error fetching ${symbol}:`, error);
                return null;
            }
        }

        // Create stock card element
        function createStockCard(data) {
            const card = document.createElement('div');
            card.className = 'card';
            
            const isPositive = data.change >= 0;
            const changeClass = isPositive ? 'price-up' : 'price-down';
            const changeSymbol = isPositive ? '📈' : '📉';
            
            card.innerHTML = `
                <h2>${changeSymbol} ${data.symbol}</h2>
                <div class="card-content">
                    <div class="stock-item">
                        <span>Current Price:</span>
                        <span class="stock-price">$${data.price.toFixed(2)}</span>
                    </div>
                    <div class="stock-item">
                        <span>Change:</span>
                        <span class="price-change ${changeClass}">
                            ${isPositive ? '+' : ''}${data.change.toFixed(2)} (${data.changePercent.toFixed(2)}%)
                        </span>
                    </div>
                    <div class="stock-item">
                        <span>High:</span>
                        <span>$${data.high.toFixed(2)}</span>
                    </div>
                    <div class="stock-item">
                        <span>Low:</span>
                        <span>$${data.low.toFixed(2)}</span>
                    </div>
                    <div class="stock-item">
                        <span>Open:</span>
                        <span>$${data.open.toFixed(2)}</span>
                    </div>
                </div>
            `;
            
            return card;
        }

        // Search for a specific stock
        async function searchStock() {
            const input = document.getElementById('stockInput');
            const symbol = input.value.toUpperCase().trim();
            
            if (!symbol) {
                showError('Please enter a stock symbol');
                return;
            }
            
            // Check if stock already on dashboard
            const existingCards = document.querySelectorAll('.card h2');
            const exists = Array.from(existingCards).some(h2 => h2.textContent.includes(symbol));
            
            if (exists) {
                showError(`${symbol} is already on the dashboard`);
                return;
            }
            
            await addStockCard(symbol);
            input.value = '';
        }

        // Show/hide loading indicator
        function showLoading(show) {
            document.getElementById('loading').style.display = show ? 'block' : 'none';
        }

        // Show error message
        function showError(message) {
            const errorDiv = document.getElementById('error');
            errorDiv.textContent = message;
            errorDiv.style.display = 'block';
            setTimeout(() => {
                errorDiv.style.display = 'none';
            }, 5000);
        }

        // Update last updated timestamp
        function updateLastUpdated() {
            const now = new Date();
            document.getElementById('lastUpdated').textContent = 
                `Last updated: ${now.toLocaleString()}`;
        }

        // Refresh data every 5 minutes
        setInterval(() => {
            loadDefaultStocks();
        }, 5 * 60 * 1000);
    </script>
</body>
</html>\n
